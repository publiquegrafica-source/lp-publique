<!doctype html>
<html lang="pt-BR" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cartão Digital de Felicitações</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&amp;family=Quicksand:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    
    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(5deg); }
    }
    
    @keyframes confetti-fall {
      0% { transform: translateY(-100%) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100%) rotate(720deg); opacity: 0; }
    }
    
    @keyframes pulse-glow {
      0%, 100% { filter: drop-shadow(0 0 10px rgba(255,255,255,0.5)); }
      50% { filter: drop-shadow(0 0 25px rgba(255,255,255,0.8)); }
    }
    
    @keyframes sparkle {
      0%, 100% { opacity: 0; transform: scale(0); }
      50% { opacity: 1; transform: scale(1); }
    }
    
    @keyframes bounce-in {
      0% { transform: scale(0); opacity: 0; }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); opacity: 1; }
    }
    
    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    
    @keyframes heart-beat {
      0%, 100% { transform: scale(1); }
      25% { transform: scale(1.1); }
      50% { transform: scale(1); }
      75% { transform: scale(1.15); }
    }
    
    .float-animation { animation: float 3s ease-in-out infinite; }
    .confetti { animation: confetti-fall 3s linear forwards; }
    .pulse-glow { animation: pulse-glow 2s ease-in-out infinite; }
    .sparkle { animation: sparkle 1.5s ease-in-out infinite; }
    .bounce-in { animation: bounce-in 0.6s ease-out forwards; }
    .heart-beat { animation: heart-beat 1s ease-in-out infinite; }
    
    .shimmer-text {
      background: linear-gradient(90deg, currentColor 40%, #fff 50%, currentColor 60%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 3s linear infinite;
    }
    
    .card-container {
      perspective: 1000px;
    }
    
    .card {
      transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      transform-style: preserve-3d;
    }
    
    .card:hover {
      transform: rotateY(5deg) rotateX(5deg);
    }
    
    .interactive-element {
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .interactive-element:hover {
      transform: scale(1.1);
    }
    
    .interactive-element:active {
      transform: scale(0.95);
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full m-0 p-0 overflow-auto" style="font-family: 'Quicksand', sans-serif;">
  <div id="app-container" class="w-full h-full min-h-full flex items-center justify-center p-4" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);"><!-- Confetti Container -->
   <div id="confetti-container" class="fixed inset-0 pointer-events-none overflow-hidden z-10"></div><!-- Sparkles Background -->
   <div id="sparkles-container" class="fixed inset-0 pointer-events-none z-0"></div><!-- Main Card -->
   <div class="card-container w-full max-w-lg">
    <div class="card relative rounded-3xl shadow-2xl overflow-hidden" style="background: linear-gradient(180deg, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.85) 100%); backdrop-filter: blur(10px);"><!-- Decorative Top Banner -->
     <div class="h-3" style="background: linear-gradient(90deg, #667eea, #764ba2, #f093fb, #764ba2, #667eea); background-size: 200% 100%; animation: shimmer 3s linear infinite;"></div><!-- Card Content -->
     <div class="p-8 text-center relative"><!-- Floating Balloons -->
      <div class="absolute top-4 left-4 interactive-element" onclick="triggerBalloonPop(this)">
       <svg class="w-12 h-16 float-animation" style="animation-delay: 0s;" viewbox="0 0 50 70"><ellipse cx="25" cy="25" rx="20" ry="25" fill="#667eea" /> <path d="M25 50 Q25 55 23 60 L27 60 Q25 55 25 50" fill="#667eea" /> <path d="M25 60 L25 70" stroke="#888" stroke-width="1" fill="none" />
       </svg>
      </div>
      <div class="absolute top-8 right-4 interactive-element" onclick="triggerBalloonPop(this)">
       <svg class="w-10 h-14 float-animation" style="animation-delay: 0.5s;" viewbox="0 0 50 70"><ellipse cx="25" cy="25" rx="20" ry="25" fill="#f093fb" /> <path d="M25 50 Q25 55 23 60 L27 60 Q25 55 25 50" fill="#f093fb" /> <path d="M25 60 L25 70" stroke="#888" stroke-width="1" fill="none" />
       </svg>
      </div>
      <div class="absolute top-16 left-12 interactive-element" onclick="triggerBalloonPop(this)">
       <svg class="w-8 h-12 float-animation" style="animation-delay: 1s;" viewbox="0 0 50 70"><ellipse cx="25" cy="25" rx="20" ry="25" fill="#764ba2" /> <path d="M25 50 Q25 55 23 60 L27 60 Q25 55 25 50" fill="#764ba2" /> <path d="M25 60 L25 70" stroke="#888" stroke-width="1" fill="none" />
       </svg>
      </div><!-- Cake Icon -->
      <div class="mb-6 flex justify-center">
       <div class="interactive-element pulse-glow" onclick="triggerCakeAnimation()">
        <svg id="cake-svg" class="w-32 h-32" viewbox="0 0 100 100"><!-- Cake Base --> <rect x="15" y="55" width="70" height="35" rx="5" fill="#f8b4d9" /> <rect x="20" y="45" width="60" height="15" rx="3" fill="#fcd34d" /> <rect x="25" y="38" width="50" height="12" rx="3" fill="#fb7185" /> <!-- Frosting Details --> <path d="M20 55 Q25 50 30 55 Q35 50 40 55 Q45 50 50 55 Q55 50 60 55 Q65 50 70 55 Q75 50 80 55" stroke="#fff" stroke-width="3" fill="none" /> <!-- Candles --> <rect x="35" y="25" width="4" height="15" fill="#60a5fa" /> <rect x="48" y="20" width="4" height="20" fill="#a78bfa" /> <rect x="61" y="25" width="4" height="15" fill="#f472b6" /> <!-- Flames --> <ellipse id="flame1" cx="37" cy="22" rx="3" ry="5" fill="#fcd34d">
          <animate attributename="ry" values="5;6;5" dur="0.3s" repeatcount="indefinite" />
         </ellipse> <ellipse id="flame2" cx="50" cy="17" rx="3" ry="5" fill="#fb923c">
          <animate attributename="ry" values="5;7;5" dur="0.4s" repeatcount="indefinite" />
         </ellipse> <ellipse id="flame3" cx="63" cy="22" rx="3" ry="5" fill="#fcd34d">
          <animate attributename="ry" values="5;6;5" dur="0.35s" repeatcount="indefinite" />
         </ellipse>
        </svg>
       </div>
      </div><!-- Main Greeting -->
      <h1 id="main-message" class="text-4xl md:text-5xl font-bold mb-2 shimmer-text" style="font-family: 'Pacifico', cursive; color: #764ba2;">Feliz Aniversário!</h1><!-- Recipient Name -->
      <h2 id="recipient-name" class="text-3xl md:text-4xl font-bold mb-6" style="font-family: 'Pacifico', cursive; color: #667eea;">Emma</h2><!-- Decorative Hearts -->
      <div class="flex justify-center gap-4 mb-6"><span class="text-3xl interactive-element heart-beat" style="color: #f093fb;" onclick="createHeartBurst(event)">💖</span> <span class="text-3xl interactive-element heart-beat" style="animation-delay: 0.2s; color: #764ba2;" onclick="createHeartBurst(event)">💜</span> <span class="text-3xl interactive-element heart-beat" style="animation-delay: 0.4s; color: #667eea;" onclick="createHeartBurst(event)">💙</span>
      </div><!-- Message -->
      <p id="sub-message" class="text-lg md:text-xl mb-8" style="color: #6b7280;">Que todos os seus sonhos se realizem neste dia especial! 🌟</p><!-- Interactive Button --> <button id="celebration-btn" onclick="triggerCelebration()" class="interactive-element px-8 py-4 rounded-full text-white font-bold text-lg shadow-lg transition-all duration-300" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);"> 🎉 Clique para Celebrar! 🎉 </button> <!-- Stars decoration -->
      <div class="mt-8 flex justify-center gap-2"><span class="text-2xl sparkle" style="animation-delay: 0s;">⭐</span> <span class="text-2xl sparkle" style="animation-delay: 0.3s;">✨</span> <span class="text-2xl sparkle" style="animation-delay: 0.6s;">⭐</span> <span class="text-2xl sparkle" style="animation-delay: 0.9s;">✨</span> <span class="text-2xl sparkle" style="animation-delay: 1.2s;">⭐</span>
      </div>
     </div><!-- Bottom Banner -->
     <div class="h-3" style="background: linear-gradient(90deg, #f093fb, #764ba2, #667eea, #764ba2, #f093fb); background-size: 200% 100%; animation: shimmer 3s linear infinite;"></div>
    </div>
   </div>
  </div>
  <script>
    const defaultConfig = {
      recipient_name: 'Emma',
      main_message: 'Feliz Aniversário!',
      sub_message: 'Que todos os seus sonhos se realizem neste dia especial! 🌟',
      primary_color: '#667eea',
      secondary_color: '#764ba2',
      accent_color: '#f093fb',
      text_color: '#374151',
      font_family: 'Quicksand'
    };

    async function onConfigChange(config) {
      const recipientEl = document.getElementById('recipient-name');
      const mainMsgEl = document.getElementById('main-message');
      const subMsgEl = document.getElementById('sub-message');
      
      if (recipientEl) recipientEl.textContent = config.recipient_name || defaultConfig.recipient_name;
      if (mainMsgEl) mainMsgEl.textContent = config.main_message || defaultConfig.main_message;
      if (subMsgEl) subMsgEl.textContent = config.sub_message || defaultConfig.sub_message;
      
      const fontFamily = config.font_family || defaultConfig.font_family;
      document.body.style.fontFamily = `${fontFamily}, sans-serif`;
    }

    function mapToCapabilities(config) {
      return {
        recolorables: [
          {
            get: () => config.primary_color || defaultConfig.primary_color,
            set: (value) => { config.primary_color = value; window.elementSdk.setConfig({ primary_color: value }); }
          },
          {
            get: () => config.secondary_color || defaultConfig.secondary_color,
            set: (value) => { config.secondary_color = value; window.elementSdk.setConfig({ secondary_color: value }); }
          },
          {
            get: () => config.accent_color || defaultConfig.accent_color,
            set: (value) => { config.accent_color = value; window.elementSdk.setConfig({ accent_color: value }); }
          },
          {
            get: () => config.text_color || defaultConfig.text_color,
            set: (value) => { config.text_color = value; window.elementSdk.setConfig({ text_color: value }); }
          }
        ],
        borderables: [],
        fontEditable: {
          get: () => config.font_family || defaultConfig.font_family,
          set: (value) => { config.font_family = value; window.elementSdk.setConfig({ font_family: value }); }
        },
        fontSizeable: undefined
      };
    }

    function mapToEditPanelValues(config) {
      return new Map([
        ['recipient_name', config.recipient_name || defaultConfig.recipient_name],
        ['main_message', config.main_message || defaultConfig.main_message],
        ['sub_message', config.sub_message || defaultConfig.sub_message]
      ]);
    }

    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange,
        mapToCapabilities,
        mapToEditPanelValues
      });
    }

    // Confetti colors
    const confettiColors = ['#667eea', '#764ba2', '#f093fb', '#fcd34d', '#fb7185', '#60a5fa'];
    
    // Create confetti piece
    function createConfetti() {
      const container = document.getElementById('confetti-container');
      const confetti = document.createElement('div');
      const color = confettiColors[Math.floor(Math.random() * confettiColors.length)];
      const size = Math.random() * 10 + 5;
      const left = Math.random() * 100;
      const duration = Math.random() * 2 + 2;
      const delay = Math.random() * 0.5;
      
      confetti.style.cssText = `
        position: absolute;
        width: ${size}px;
        height: ${size}px;
        background: ${color};
        left: ${left}%;
        top: -20px;
        border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
        animation: confetti-fall ${duration}s linear ${delay}s forwards;
      `;
      
      container.appendChild(confetti);
      
      setTimeout(() => confetti.remove(), (duration + delay) * 1000);
    }
    
    // Trigger celebration
    function triggerCelebration() {
      for (let i = 0; i < 50; i++) {
        setTimeout(createConfetti, i * 30);
      }
      
      const btn = document.getElementById('celebration-btn');
      btn.style.transform = 'scale(1.1)';
      setTimeout(() => btn.style.transform = 'scale(1)', 200);
    }
    
    // Balloon pop effect
    function triggerBalloonPop(element) {
      element.style.animation = 'none';
      element.style.transform = 'scale(1.3)';
      element.style.opacity = '0.5';
      
      setTimeout(() => {
        element.style.transform = 'scale(1)';
        element.style.opacity = '1';
        element.style.animation = '';
      }, 300);
      
      // Create mini confetti burst
      for (let i = 0; i < 10; i++) {
        createConfetti();
      }
    }
    
    // Cake animation
    function triggerCakeAnimation() {
      const cake = document.getElementById('cake-svg');
      cake.style.transform = 'scale(1.1) rotate(5deg)';
      
      setTimeout(() => {
        cake.style.transform = 'scale(1) rotate(0deg)';
      }, 300);
      
      // Create sparkle burst
      for (let i = 0; i < 20; i++) {
        setTimeout(createConfetti, i * 50);
      }
    }
    
    // Heart burst effect
    function createHeartBurst(event) {
      const hearts = ['💖', '💜', '💙', '💕', '💗'];
      const container = document.getElementById('confetti-container');
      
      for (let i = 0; i < 8; i++) {
        const heart = document.createElement('div');
        const angle = (i / 8) * Math.PI * 2;
        const distance = 100;
        
        heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
        heart.style.cssText = `
          position: fixed;
          left: ${event.clientX}px;
          top: ${event.clientY}px;
          font-size: 24px;
          pointer-events: none;
          transition: all 0.8s ease-out;
          z-index: 100;
        `;
        
        container.appendChild(heart);
        
        setTimeout(() => {
          heart.style.transform = `translate(${Math.cos(angle) * distance}px, ${Math.sin(angle) * distance}px)`;
          heart.style.opacity = '0';
        }, 10);
        
        setTimeout(() => heart.remove(), 800);
      }
    }
    
    // Create background sparkles
    function createSparkles() {
      const container = document.getElementById('sparkles-container');
      
      for (let i = 0; i < 20; i++) {
        const sparkle = document.createElement('div');
        sparkle.textContent = '✨';
        sparkle.style.cssText = `
          position: absolute;
          left: ${Math.random() * 100}%;
          top: ${Math.random() * 100}%;
          font-size: ${Math.random() * 15 + 10}px;
          opacity: ${Math.random() * 0.5 + 0.3};
          animation: sparkle ${Math.random() * 2 + 1}s ease-in-out infinite;
          animation-delay: ${Math.random() * 2}s;
        `;
        container.appendChild(sparkle);
      }
    }
    
    // Initialize sparkles on load
    createSparkles();
    
    // Auto-trigger some confetti on load
    setTimeout(() => {
      for (let i = 0; i < 20; i++) {
        setTimeout(createConfetti, i * 100);
      }
    }, 500);
  </script>
